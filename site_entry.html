    <script>
      var origin = window.origin
      const css = [
        {
          className: 'base-css',
          url: 'cdn/css/base.css'
        },
        {
          className: 'custom-dark-css',
          url: 'cdn/css/custom-dark.css'
        },
        {
          className: 'custom-light-css',
          url: 'cdn/css/custom-light.css'
        }
      ]

      function addStyles(arr) {
        for (var item of arr) {
          const { className, url } = item
          const linkEl = document.querySelector(`.${className}`)

          if (!linkEl) {
            // 动态插入 CSS
            const link = document.createElement('link')
            link.className = className
            link.rel = 'stylesheet'
            link.href = `${origin}/app/static/${url}`
            document.head.appendChild(link)
          }
        }
      }
      // addStyles(css)

      let shiftPressed = false
      let zPressed = false
      // 监听键盘事件
      window.addEventListener('keydown', function (e) {
        // 检查 Shift 键是否按下
        if (e.key === 'Shift') {
          shiftPressed = true
        }

        // 检查 Z 键是否按下
        if (e.key === 'z' || e.key === 'Z') {
          zPressed = true
        }

        if (shiftPressed && zPressed && e.key === 'F5') {
          // 弹出确认对话框
          if (confirm('是否清除浏览器缓存?')) {
            // 清除缓存
            clearBrowserCache()
            // 重新加载页面
            window.location.href = '/' // true 表示强制从服务器重新加载页面
          }
        }
      })
      window.addEventListener('keyup', function (e) {
        // 当 Shift 或 Z 键释放时，将它们的状态重置
        if (e.key === 'Shift') {
          shiftPressed = false
        }
        if (e.key === 'z' || e.key === 'Z') {
          zPressed = false
        }
      })

      // 清除浏览器缓存的函数
      function clearBrowserCache() {
        if ('caches' in window) {
          // 清除浏览器 Cache Storage
          caches.keys().then(function (keyList) {
            return Promise.all(
              keyList.map(function (key) {
                return caches.delete(key)
              })
            )
          })
        }

        // 清除 Local Storage
        localStorage.clear()

        // 清除 Session Storage
        sessionStorage.clear()

        // 清除 cookies
        document.cookie.split(';').forEach(function (cookie) {
          document.cookie = cookie.split('=')[0] + '=;expires=Thu, 01 Jan 1970 00:00:00 GMT'
        })
      }
    </script>

    <div id="app">
      <style>
        html[data-theme='dark'] .app-loading {
          background-color: #2c344a;
        }

        html[data-theme='dark'] .app-loading .app-loading-title {
          color: rgba(255, 255, 255, 0.85);
        }

        .app-loading {
          display: flex;
          width: 100%;
          height: 100%;
          justify-content: center;
          align-items: center;
          flex-direction: column;
          background-color: #f4f7f9;
        }

        .app-loading .app-loading-wrap {
          position: absolute;
          top: 50%;
          left: 50%;
          display: flex;
          -webkit-transform: translate3d(-50%, -50%, 0);
          transform: translate3d(-50%, -50%, 0);
          justify-content: center;
          align-items: center;
          flex-direction: column;
        }

        .app-loading .dots {
          display: flex;
          padding: 98px;
          justify-content: center;
          align-items: center;
        }

        .app-loading .app-loading-title {
          display: flex;
          margin-top: 30px;
          font-size: 30px;
          color: rgba(0, 0, 0, 0.85);
          justify-content: center;
          align-items: center;
        }

        .app-loading .app-loading-logo {
          display: block;
          width: 150px;
          margin: 0 auto;
          margin-bottom: 20px;
          /* filter: drop-shadow(150px 0 #252526);
          position: relative;
          left: -150px; */
        }

        .dot {
          position: relative;
          display: inline-block;
          width: 48px;
          height: 48px;
          margin-top: 30px;
          font-size: 32px;
          transform: rotate(45deg);
          box-sizing: border-box;
          animation: antRotate 1.2s infinite linear;
        }

        .dot i {
          position: absolute;
          display: block;
          width: 20px;
          height: 20px;
          background-color: #0065cc;
          border-radius: 100%;
          opacity: 0.3;
          transform: scale(0.75);
          animation: antSpinMove 1s infinite linear alternate;
          transform-origin: 50% 50%;
        }

        .dot i:nth-child(1) {
          top: 0;
          left: 0;
        }

        .dot i:nth-child(2) {
          top: 0;
          right: 0;
